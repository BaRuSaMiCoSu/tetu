<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英単語テスト作成アプリ</title>
    <!-- html2pdf.js の読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f7f9fc;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding: 20px;
            background: #ecf0f1;
            border-radius: 8px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 150px;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        select, input[type="number"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .btn-download {
            background-color: #27ae60;
            margin-top: 20px;
            display: none;
        }
        .btn-download:hover {
            background-color: #2ecc71;
        }
        
        /* テスト用紙エリア */
        #test-paper {
            padding: 20px;
            background: #fff;
        }
        .test-header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
        }
        .test-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .name-box {
            width: 200px;
            border-bottom: 1px solid #000;
            display: inline-block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        th, td {
            border: 1px solid #000;
            padding: 10px;
            font-size: 14px;
        }
        th {
            background-color: #f2f2f2;
            width: 10%;
        }
        .col-question {
            width: 45%;
        }
        .col-answer {
            width: 45%;
        }
        .page-break {
            page-break-before: always;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>英単語テスト作成アプリ</h1>
    
    <div class="controls">
        <div class="control-group">
            <label for="question-count">問題数</label>
            <input type="number" id="question-count" value="10" min="1" max="132">
        </div>
        <div class="control-group">
            <label for="question-type">出題形式</label>
            <select id="question-type">
                <option value="en-ja">英単語 → 意味</option>
                <option value="ja-en">意味 → 英単語</option>
            </select>
        </div>
        <div class="control-group" style="justify-content: flex-end;">
            <button onclick="generateTest()">テストを作成</button>
        </div>
    </div>

    <div id="test-container" style="display: none;">
        <div id="test-paper">
            <!-- 問題ページ -->
            <div id="question-page">
                <div class="test-header">
                    <h2>英単語テスト</h2>
                </div>
                <div class="test-info">
                    <span>日付： 月 日</span>
                    <span>氏名： <span class="name-box"></span></span>
                    <span>得点： / <span id="display-count"></span></span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>No.</th>
                            <th class="col-question">問題</th>
                            <th class="col-answer">解答</th>
                        </tr>
                    </thead>
                    <tbody id="test-body">
                        <!-- 問題がここに挿入される -->
                    </tbody>
                </table>
            </div>

            <div class="page-break"></div>

            <!-- 解答ページ -->
            <div id="answer-page">
                <div class="test-header">
                    <h2>英単語テスト (解答)</h2>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>No.</th>
                            <th class="col-question">問題</th>
                            <th class="col-answer">正解</th>
                        </tr>
                    </thead>
                    <tbody id="answer-body">
                        <!-- 解答がここに挿入される -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <button class="btn-download" id="download-btn" onclick="downloadPDF()">PDFでダウンロード</button>
    </div>
</div>

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function generateTest() {
        const count = parseInt(document.getElementById('question-count').value, 10);
        const type = document.getElementById('question-type').value;
        
        if (count < 1 || count > wordData.length) {
            alert(`問題数は1から${wordData.length}の間で指定してください。`);
            return;
        }

        // 単語リストをシャッフルして必要な数だけ抽出
        const shuffled = shuffleArray([...wordData]);
        const selectedWords = shuffled.slice(0, count);

        const testBody = document.getElementById('test-body');
        const answerBody = document.getElementById('answer-body');
        
        testBody.innerHTML = '';
        answerBody.innerHTML = '';
        
        document.getElementById('display-count').textContent = count;

        selectedWords.forEach((item, index) => {
            const no = index + 1;
            let questionText, answerText;

            if (type === 'en-ja') {
                questionText = item.en;
                answerText = item.ja;
            } else {
                questionText = item.ja;
                answerText = item.en;
            }

            // 問題行作成
            const trTest = document.createElement('tr');
            trTest.innerHTML = `
                <td style="text-align:center;">${no}</td>
                <td>${questionText}</td>
                <td></td>
            `;
            testBody.appendChild(trTest);

            // 解答行作成
            const trAns = document.createElement('tr');
            trAns.innerHTML = `
                <td style="text-align:center;">${no}</td>
                <td>${questionText}</td>
                <td>${answerText}</td>
            `;
            answerBody.appendChild(trAns);
        });

        document.getElementById('test-container').style.display = 'block';
        document.getElementById('download-btn').style.display = 'block';
    }

    function downloadPDF() {
        const element = document.getElementById('test-paper');
        const opt = {
            margin:       10,
            filename:     'word_test.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // Promise-based API
        html2pdf().set(opt).from(element).save();
    }
</script>
